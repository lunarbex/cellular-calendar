<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>n o w</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Karla:wght@300;400&display=swap');
  :root {
    --bg: #0a0d0b; --membrane-active: #5a8c6a; --membrane-dormant: #3a4d3f;
    --membrane-spore: #242a26; --membrane-resurgent: #98c67a;
    --charge: #b8e888; --text: #d8e8d0; --text-dim: #6a806a;
    --fodder-text: #8a9a85; --panel: rgba(14, 20, 16, 0.97);
    --threshold: #e4f8b0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(ellipse at 30% 40%, #0d100e 0%, #070907 100%);
    font-family: 'Karla', sans-serif; color: var(--text);
    overflow: hidden; height: 100vh; width: 100vw;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: 
      radial-gradient(circle at 20% 50%, rgba(90, 140, 106, 0.02) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(90, 140, 106, 0.015) 0%, transparent 50%);
    pointer-events: none; z-index: 1;
  }
  #field { position: absolute; inset: 0; z-index: 2; }
  #mt-canvas { position: absolute; inset: 0; z-index: 6; pointer-events: none; }
  .cell {
    position: absolute; cursor: grab; z-index: 10;
    font-family: 'Crimson Text', serif; user-select: none;
    transition: transform 0.2s ease-out;
  }
  .cell:active { cursor: grabbing; }
  .cell:hover { transform: scale(1.015); }
  .cell.selected { filter: drop-shadow(0 0 14px rgba(200, 216, 192, 0.4)); }
  .cell-membrane { position: absolute; inset: 0; pointer-events: none; }
  .membrane-path {
    fill: none; stroke-width: 1.8; stroke-linecap: round;
    stroke-linejoin: round; filter: url(#organic-blur);
    transition: stroke-width 0.3s ease;
  }
  .cell[data-state="active"] .membrane-path {
    stroke: var(--membrane-active); fill: rgba(90, 140, 106, 0.06);
    animation: membraneBreath 4s ease-in-out infinite;
  }
  .cell[data-state="dormant"] .membrane-path {
    stroke: var(--membrane-dormant); stroke-dasharray: 4 3;
    fill: rgba(58, 77, 63, 0.04); opacity: 0.6;
  }
  .cell[data-state="spore"] .membrane-path {
    stroke: var(--membrane-spore); stroke-dasharray: 2 4;
    fill: rgba(36, 42, 38, 0.03); opacity: 0.3; filter: blur(1.2px);
  }
  .cell[data-state="resurgent"] .membrane-path {
    stroke: var(--membrane-resurgent); stroke-width: 2.2;
    fill: rgba(152, 198, 122, 0.09);
    animation: resurgeGlow 2.8s ease-in-out infinite;
  }
  @keyframes membraneBreath {
    0%, 100% { stroke-width: 1.8; opacity: 0.9; }
    50% { stroke-width: 2; opacity: 1; }
  }
  @keyframes resurgeGlow {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(152, 198, 122, 0.3)) url(#organic-blur); }
    50% { filter: drop-shadow(0 0 18px rgba(152, 198, 122, 0.5)) url(#organic-blur); }
  }
  .cell.threshold .membrane-path {
    stroke: var(--threshold); stroke-width: 2.4;
    filter: drop-shadow(0 0 20px rgba(228, 248, 176, 0.4)) url(#organic-blur);
  }
  .cell-interior {
    position: absolute; inset: 8%; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; pointer-events: none; overflow: hidden;
  }
  .cell-intention {
    font-style: italic; font-size: 13px; font-weight: 400;
    color: var(--text); text-align: center; line-height: 1.3;
    max-width: 85%; word-wrap: break-word;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3); letter-spacing: 0.3px;
  }
  .cell-timespan {
    font-family: 'Karla', sans-serif; font-size: 9px;
    font-weight: 300; color: var(--text-dim);
    letter-spacing: 0.8px; text-transform: lowercase;
  }
  .cell-fodder {
    position: absolute; inset: 18%; display: flex;
    flex-direction: column; gap: 3px; font-size: 8px;
    color: var(--fodder-text); font-style: italic;
    line-height: 1.2; opacity: 0.7; overflow: hidden;
    text-align: center; pointer-events: none;
  }
  .fodder-fragment {
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; padding: 0 4px;
  }
  .state-dot {
    position: absolute; top: 12px; right: 12px;
    width: 6px; height: 6px; border-radius: 50%;
    opacity: 0.6; pointer-events: none;
  }
  .state-dot.active { background: var(--membrane-active); }
  .state-dot.dormant { background: var(--membrane-dormant); }
  .state-dot.spore { background: var(--membrane-spore); }
  .state-dot.resurgent { 
    background: var(--membrane-resurgent); 
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }
  .charge-ring { position: absolute; inset: -8px; pointer-events: none; opacity: 0.5; }
  .charge-arc-path {
    fill: none; stroke-width: 1; stroke-linecap: round;
    transition: stroke-dasharray 0.8s ease;
  }
  #panel {
    position: fixed; right: 0; top: 0; width: 320px; height: 100vh;
    background: var(--panel); border-left: 1px solid rgba(90, 140, 106, 0.15);
    padding: 36px 24px 24px; z-index: 100; display: none;
    overflow-y: auto; font-size: 13px; backdrop-filter: blur(8px);
  }
  #panel.open { display: block; }
  #panel h2 {
    font-family: 'Crimson Text', serif; font-size: 17px;
    font-style: italic; font-weight: 600; color: var(--text);
    margin-bottom: 24px; padding-bottom: 14px;
    border-bottom: 1px solid rgba(90, 140, 106, 0.15);
    letter-spacing: 0.5px;
  }
  .field-label {
    display: block; color: var(--text-dim); font-size: 9px;
    text-transform: uppercase; letter-spacing: 2px;
    margin-top: 18px; margin-bottom: 6px; font-weight: 400;
  }
  input[type="text"], input[type="number"], textarea, select {
    width: 100%; background: rgba(90, 140, 106, 0.04);
    border: 1px solid rgba(90, 140, 106, 0.2);
    color: var(--text); padding: 9px 11px;
    font-family: 'Karla', sans-serif; font-size: 13px;
    border-radius: 3px; outline: none; transition: all 0.2s;
  }
  input:focus, textarea:focus, select:focus {
    border-color: rgba(90, 140, 106, 0.5);
    background: rgba(90, 140, 106, 0.08);
  }
  textarea { 
    min-height: 80px; resize: vertical; 
    font-family: 'Crimson Text', serif; font-style: italic; 
  }
  .timespan-row { display: flex; gap: 7px; }
  .timespan-row input { flex: 1; }
  .timespan-row select { flex: 0 0 92px; }
  .state-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px; }
  .state-btn {
    padding: 7px; border: 1px solid rgba(90, 140, 106, 0.2);
    background: transparent; color: var(--text-dim);
    font-family: 'Karla', sans-serif; font-size: 11px;
    cursor: pointer; border-radius: 3px; transition: all 0.2s;
    font-weight: 300;
  }
  .state-btn:hover { border-color: rgba(90, 140, 106, 0.5); color: var(--text); }
  .state-btn.sel { 
    background: rgba(90, 140, 106, 0.14); 
    border-color: var(--membrane-active); 
    color: var(--text); font-weight: 400;
  }
  .charge-bar-outer { 
    width:100%; height:3px; background:rgba(90, 140, 106, 0.12); 
    border-radius:3px; margin-top:6px; overflow:hidden; 
  }
  .charge-bar-inner { 
    height:100%; background: linear-gradient(to right, var(--membrane-active), var(--charge)); 
    border-radius:3px; transition: width 0.6s ease; 
  }
  .fodder-item {
    padding: 7px 10px; margin: 4px 0;
    border-left: 2px solid rgba(90, 140, 106, 0.3);
    font-size: 12px; color: var(--fodder-text);
    cursor: pointer; font-style: italic; transition: all 0.2s;
    font-family: 'Crimson Text', serif; line-height: 1.4;
  }
  .fodder-item:hover { 
    color: var(--text); border-left-color: var(--membrane-active);
    background: rgba(90, 140, 106, 0.05);
  }
  .fodder-add { display: flex; gap: 6px; margin-top: 8px; align-items: flex-end; }
  .fodder-add textarea { flex: 1; }
  .btn {
    background: transparent; border: 1px solid rgba(90, 140, 106, 0.28);
    color: var(--text-dim); padding: 8px 13px;
    font-family: 'Karla', sans-serif; font-size: 12px;
    cursor: pointer; border-radius: 3px; transition: all 0.2s;
    font-weight: 300;
  }
  .btn:hover { 
    border-color: var(--membrane-active); color: var(--text);
    background: rgba(90, 140, 106, 0.06);
  }
  .btn.danger { border-color: rgba(130, 70, 70, 0.4); color: rgba(190, 110, 110, 0.7); }
  .btn.danger:hover { border-color: rgba(190, 90, 90, 0.6); color: rgba(230, 130, 130, 0.9); }
  .btn.active-mode { 
    background: rgba(90, 140, 106, 0.16); border-color: var(--membrane-active); 
    color: var(--text); font-weight: 400;
  }
  hr.div { border:none; border-top: 1px solid rgba(90, 140, 106, 0.1); margin: 20px 0; }
  #close-panel {
    position: absolute; top: 14px; right: 16px;
    background: transparent; border: none;
    color: var(--text-dim); font-size: 20px;
    cursor: pointer; line-height: 1; transition: color 0.2s;
  }
  #close-panel:hover { color: var(--text); }
  #topbar {
    position: fixed; top: 0; left: 0; right: 320px; height: 52px; z-index: 50;
    display: flex; align-items: center; padding: 0 22px; gap: 10px;
    background: linear-gradient(to bottom, rgba(10, 13, 11, 0.95), transparent);
    backdrop-filter: blur(4px);
  }
  #title {
    font-family: 'Crimson Text', serif; font-size: 15px; 
    font-style: italic; font-weight: 600; color: var(--text-dim); 
    letter-spacing: 6px; margin-right: 14px;
  }
  #status {
    position: fixed; bottom: 18px; left: 22px; font-size: 11px; 
    color: var(--text-dim); z-index: 50; pointer-events: none;
    letter-spacing: 0.4px; transition: opacity 0.6s;
    font-family: 'Crimson Text', serif; font-style: italic;
  }
  #save-indicator {
    position: fixed; bottom: 18px; right: 340px;
    font-size: 10px; color: var(--membrane-resurgent);
    z-index: 50; pointer-events: none; opacity: 0;
    transition: opacity 0.3s; font-family: 'Karla', sans-serif;
    letter-spacing: 0.5px;
  }
  #save-indicator.show { opacity: 1; }
  #threshold-flash {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, rgba(228, 248, 176, 0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 200; opacity: 0; transition: opacity 0.5s ease;
  }
  #threshold-flash.flash { opacity: 1; transition: opacity 0s; }
  .ribosome-hint {
    position: fixed; bottom: 42px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid rgba(152, 198, 122, 0.3);
    padding: 11px 18px; font-family: 'Crimson Text', serif;
    font-style: italic; font-size: 13px; color: var(--membrane-resurgent);
    z-index: 150; max-width: 480px; text-align: center;
    opacity: 0; transition: opacity 0.7s ease; pointer-events: none; 
    border-radius: 3px; backdrop-filter: blur(6px); line-height: 1.5;
  }
  .ribosome-hint.visible { opacity: 1; }
  #panel-empty {
    color: var(--text-dim); font-style: italic;
    font-family: 'Crimson Text', serif; font-size: 14px; 
    text-align: center; margin-top: 60px; line-height: 2.2;
  }
  input[type="color"] {
    width:100%; height:34px; border: 1px solid rgba(90, 140, 106, 0.2);
    background: rgba(90, 140, 106, 0.04); cursor: pointer; 
    border-radius: 3px; padding: 3px;
  }
  input[type="range"] { width:100%; accent-color: var(--membrane-active); margin-top:3px; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(90, 140, 106, 0.3); border-radius:3px; }
</style>
</head>
<body>
<canvas id="field"></canvas>
<canvas id="mt-canvas"></canvas>
<div id="threshold-flash"></div>
<svg style="position:absolute; width:0; height:0;">
  <defs>
    <filter id="organic-blur">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.8" />
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
  </defs>
</svg>
<div id="topbar">
  <span id="title">n &nbsp; o &nbsp; w</span>
  <button class="btn" id="btn-new">+ cell</button>
  <button class="btn" id="btn-connect">connect</button>
  <button class="btn" id="btn-sound">♪ on</button>
  <button class="btn" id="btn-save" title="Force save">💾 save</button>
</div>
<div id="status">inhabit like you live here</div>
<div id="save-indicator">saved ✓</div>
<div id="panel">
  <button id="close-panel">×</button>
  <h2 id="panel-title">cell</h2>
  <div id="panel-content">
    <div id="panel-empty">select a cell<br>to tend it</div>
  </div>
</div>
<div class="ribosome-hint" id="ribosome"></div>
<script>
let hasUnsavedChanges=false;
window.addEventListener('beforeunload',e=>{
  if(hasUnsavedChanges){
    e.preventDefault();
    e.returnValue='';
    return '';
  }
});
let audioCtx=null,soundOn=true;
function audio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function tone(freq,type,dur,vol=0.06,attack=0.025){if(!soundOn)return;try{const ctx=audio();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(vol,ctx.currentTime+attack);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.start();o.stop(ctx.currentTime+dur+0.15)}catch(e){}}
const sounds={
  newCell:()=>tone(587,'sine',0.4,0.045),
  connect:()=>{tone(247,'sine',1.3,0.04);setTimeout(()=>tone(370,'sine',1,0.035),240)},
  threshold:()=>{[196,294,392,587].forEach((f,i)=>setTimeout(()=>tone(f,'sine',1.4,0.045),i*220))},
  dissolve:()=>{tone(494,'sine',2.2,0.038,0.18);setTimeout(()=>tone(247,'sine',2.8,0.028,0.28),400)},
  resurge:()=>{[147,220,294,440].forEach((f,i)=>setTimeout(()=>tone(f,'sine',2.2,0.048),i*480))},
  save:()=>tone(440,'sine',0.15,0.03)
};
const fCanvas=document.getElementById('field');
const fCtx=fCanvas.getContext('2d');
const mCanvas=document.getElementById('mt-canvas');
const mCtx=mCanvas.getContext('2d');
function resize(){fCanvas.width=mCanvas.width=window.innerWidth;fCanvas.height=mCanvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
let cells=[],tubes=[],compost=[],selected=null,connectMode=false,connectFrom=null,dragging=null,dragOX=0,dragOY=0,nextId=1,ribTimer=null;
const CHARGE_THRESHOLD=78,CHARGE_DECAY_RATE=0.014,CHARGE_PER_VISIT=10,DORMANT_IDLE_S=95;
const RIBOSOME={
  threshold:'threshold dynamics — small perturbations cascade into emergent order (bifurcation)',
  connection:'coupled oscillators — mutual entrainment through resonance (mechanotransduction)',
  resurge:'phase transition from dormancy — pattern held through state change (attractor basin)',
  dissolve:'structure releasing into field — nourishment for the living matrix (endosymbiosis)',
  charge:'potential accumulation — seeking discharge across proximity gradients',
  compost:'dissolved cells feeding the matrix — nutrient cycling through ground substance',
  default:'you inhabit a living system — it learns your rhythms through attention'
};
function organicCircle(cx,cy,r,irregularity=0.08){
  const points=[],segments=24,seed=cx*cy;
  for(let i=0;i<=segments;i++){
    const angle=(i/segments)*Math.PI*2;
    const variation=Math.sin(angle*3+seed)*r*irregularity;
    const radius=r+variation;
    points.push({x:cx+Math.cos(angle)*radius,y:cy+Math.sin(angle)*radius});
  }
  return points;
}
function pointsToSVGPath(points){
  if(points.length<3)return '';
  let path=`M ${points[0].x} ${points[0].y}`;
  for(let i=0;i<points.length-2;i++){
    const p1=points[i],p2=points[i+1];
    const cpX=(p1.x+p2.x)/2,cpY=(p1.y+p2.y)/2;
    path+=` Q ${p1.x} ${p1.y} ${cpX} ${cpY}`;
  }
  const last=points[points.length-1],first=points[0];
  path+=` Q ${last.x} ${last.y} ${first.x} ${first.y} Z`;
  return path;
}
class Cell{
  constructor(x,y){
    this.id=nextId++;this.x=x;this.y=y;this.intention='';
    this.timespan=7;this.unit='days';this.color='#5a8c6a';
    this.size=120;this.fodder=[];this.state='active';
    this.charge=15;this.lastVisit=Date.now();this.born=Date.now();
    this.isThreshold=false;this.el=this.build();
  }
  build(){
    const el=document.createElement('div');
    el.className='cell';el.dataset.state='active';
    el.style.width=el.style.height=this.size+'px';
    this.position();
    const points=organicCircle(this.size/2,this.size/2,this.size/2-4,0.06);
    const pathD=pointsToSVGPath(points);
    const chargePoints=organicCircle(this.size/2,this.size/2,this.size/2+4,0.05);
    const chargePathD=pointsToSVGPath(chargePoints);
    const chargeCircumference=this.size*Math.PI*1.1;
    el.innerHTML=`
      <div class="state-dot active"></div>
      <svg class="cell-membrane" viewBox="0 0 ${this.size} ${this.size}">
        <path class="membrane-path" d="${pathD}"/>
      </svg>
      <svg class="charge-ring" viewBox="0 0 ${this.size+16} ${this.size+16}" style="left:-8px;top:-8px;width:${this.size+16}px;height:${this.size+16}px;">
        <path class="charge-arc-path" d="${chargePathD}" stroke="${this.color}" 
          stroke-dasharray="0 ${chargeCircumference}" opacity="0.6"/>
      </svg>
      <div class="cell-interior">
        <div class="cell-intention">forming...</div>
        <div class="cell-timespan">7 days</div>
      </div>
      <div class="cell-fodder" id="fodder-${this.id}"></div>
    `;
    document.body.appendChild(el);
    el.addEventListener('mousedown',e=>{
      if(connectMode){this.handleConnect();return}
      e.stopPropagation();dragging=this;
      dragOX=e.clientX-this.x;dragOY=e.clientY-this.y;
    });
    el.addEventListener('click',e=>{
      if(!connectMode){e.stopPropagation();this.visit();selectCell(this)}
    });
    return el;
  }
  position(){this.el.style.left=(this.x-this.size/2)+'px';this.el.style.top=(this.y-this.size/2)+'px'}
  move(x,y){this.x=x;this.y=y;this.position()}
  visit(){
    this.lastVisit=Date.now();
    this.charge=Math.min(100,this.charge+CHARGE_PER_VISIT);
    if(this.state==='dormant'||this.state==='spore'){
      this.setState('resurgent');sounds.resurge();ribosome('resurge');
    }
    this.syncCharge();this.checkThreshold();save();
  }
  setState(s){
    this.state=s;this.el.dataset.state=s;
    this.el.querySelector('.state-dot').className=`state-dot ${s}`;
    if(s==='spore'){sounds.dissolve();ribosome('dissolve');this.dissolveIntoMatrix()}
    if(s==='resurgent'){sounds.resurge();ribosome('resurge')}
    save();
  }
  syncCharge(){
    const arc=this.el.querySelector('.charge-arc-path');
    if(arc){
      const circumference=this.size*Math.PI*1.1;
      const dash=(this.charge/100)*circumference;
      arc.setAttribute('stroke-dasharray',`${dash} ${circumference}`);
      arc.setAttribute('stroke',this.charge>65?'#b8e888':this.color);
    }
  }
  checkThreshold(){
    if(this.charge>=CHARGE_THRESHOLD&&!this.isThreshold){
      this.isThreshold=true;this.el.classList.add('threshold');
      sounds.threshold();ribosome('threshold');flashField();this.seekConnection();
    }
    if(this.charge<CHARGE_THRESHOLD*0.5&&this.isThreshold){
      this.isThreshold=false;this.el.classList.remove('threshold');
    }
  }
  seekConnection(){
    let best=null,bestScore=Infinity;
    cells.forEach(c=>{
      if(c===this||c.state==='spore')return;
      const d=Math.hypot(c.x-this.x,c.y-this.y);
      const score=d/(c.charge+6);
      if(score<bestScore){bestScore=score;best=c}
    });
    if(best)addTube(this,best,true);
  }
  dissolveIntoMatrix(){
    for(let i=0;i<16;i++){
      compost.push({
        x:this.x+(Math.random()-0.5)*90,
        y:this.y+(Math.random()-0.5)*90,
        r:18+Math.random()*60,
        born:Date.now(),
        life:11000+Math.random()*17000
      });
    }
    ribosome('compost');
  }
  updateDisplay(){
    const intent=this.el.querySelector('.cell-intention');
    const ts=this.el.querySelector('.cell-timespan');
    if(intent)intent.textContent=this.intention||'forming...';
    if(ts)ts.textContent=`${this.timespan} ${this.unit}`;
    this.el.style.width=this.el.style.height=this.size+'px';
    this.position();
    const fodderEl=this.el.querySelector(`#fodder-${this.id}`);
    if(fodderEl&&this.fodder.length>0){
      const visible=this.fodder.slice(0,4);
      fodderEl.innerHTML=visible.map(f=>
        `<div class="fodder-fragment">${f.slice(0,25)}${f.length>25?'...':''}</div>`
      ).join('');
    }else if(fodderEl){fodderEl.innerHTML=''}
    this.syncCharge();save();
  }
  handleConnect(){
    if(!connectFrom){
      connectFrom=this;
      this.el.style.outline='1.5px solid rgba(152, 198, 122, 0.6)';
      this.el.style.outlineOffset='10px';
    }else if(connectFrom!==this){
      addTube(connectFrom,this,false);
      sounds.connect();ribosome('connection');
      connectFrom.el.style.outline='';connectFrom=null;
    }else{connectFrom.el.style.outline='';connectFrom=null}
  }
  decay(dt){
    if(this.state!=='active'&&this.state!=='resurgent')return;
    this.charge=Math.max(0,this.charge-CHARGE_DECAY_RATE*dt);
    this.syncCharge();
    const idleS=(Date.now()-this.lastVisit)/1000;
    if(this.charge<11&&this.state==='active'&&idleS>DORMANT_IDLE_S){this.setState('dormant')}
    this.checkThreshold();
  }
  remove(){
    if(this.state!=='spore')this.dissolveIntoMatrix();
    this.el.remove();
    cells=cells.filter(c=>c!==this);
    tubes=tubes.filter(t=>t.from!==this&&t.to!==this);
    save();
  }
}
function addTube(from,to,spontaneous){
  if(tubes.find(t=>(t.from===from&&t.to===to)||(t.from===to&&t.to===from)))return;
  tubes.push({from,to,spontaneous,progress:0,pOffset:Math.random(),strength:0.3,tension:0});
  save();
}
function drawTubes(){
  mCtx.clearRect(0,0,mCanvas.width,mCanvas.height);
  const now=Date.now();
  tubes.forEach(t=>{
    t.progress=Math.min(1,t.progress+0.005);
    t.strength=Math.min(0.6,t.strength+0.0007);
    const {from,to}=t;
    const dx=to.x-from.x,dy=to.y-from.y;
    const dist=Math.hypot(dx,dy);
    t.tension=Math.max(0,(dist-200)/400);
    const endX=from.x+dx*t.progress;
    const endY=from.y+dy*t.progress;
    const sway=Math.sin(now/2000+t.pOffset)*15;
    const mx=(from.x+endX)/2+dy*0.06+sway;
    const my=(from.y+endY)/2-dx*0.06;
    mCtx.beginPath();mCtx.moveTo(from.x,from.y);
    mCtx.quadraticCurveTo(mx,my,endX,endY);
    const alpha=t.spontaneous?t.strength*0.65:t.strength;
    const baseAlpha=0.35+t.tension*0.15;
    mCtx.strokeStyle=`rgba(110,170,100,${alpha*baseAlpha})`;
    mCtx.lineWidth=t.spontaneous?0.8:1.3;
    mCtx.setLineDash(t.spontaneous?[4,8]:[]);
    mCtx.stroke();mCtx.setLineDash([]);
    if(t.progress>=1){
      const p=((now/3500)+t.pOffset)%1;
      const bx=(1-p)*(1-p)*from.x+2*(1-p)*p*mx+p*p*to.x;
      const by=(1-p)*(1-p)*from.y+2*(1-p)*p*my+p*p*to.y;
      const particleAlpha=0.3+Math.sin(p*Math.PI)*0.35;
      mCtx.beginPath();mCtx.arc(bx,by,2.2,0,Math.PI*2);
      mCtx.fillStyle=`rgba(184,232,136,${particleAlpha})`;mCtx.fill();
      const grad=mCtx.createRadialGradient(bx,by,0,bx,by,8);
      grad.addColorStop(0,`rgba(184,232,136,${particleAlpha*0.4})`);
      grad.addColorStop(1,'transparent');
      mCtx.beginPath();mCtx.arc(bx,by,8,0,Math.PI*2);
      mCtx.fillStyle=grad;mCtx.fill();
    }
  });
}
function drawField(){
  fCtx.clearRect(0,0,fCanvas.width,fCanvas.height);
  fCtx.strokeStyle='rgba(40,65,50,0.08)';
  fCtx.lineWidth=0.4;
  const sp=95;
  for(let x=0;x<fCanvas.width;x+=sp){
    fCtx.beginPath();fCtx.moveTo(x,0);fCtx.lineTo(x,fCanvas.height);fCtx.stroke();
  }
  for(let y=0;y<fCanvas.height;y+=sp){
    fCtx.beginPath();fCtx.moveTo(0,y);fCtx.lineTo(fCanvas.width,y);fCtx.stroke();
  }
  const now=Date.now();
  compost.forEach((p,i)=>{
    const age=(now-p.born)/p.life;
    if(age>1){compost.splice(i,1);return}
    const alpha=Math.sin(age*Math.PI)*0.06;
    const r=p.r*(1+age*2);
    const g=fCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,r);
    g.addColorStop(0,`rgba(90,155,90,${alpha})`);
    g.addColorStop(1,'transparent');
    fCtx.beginPath();fCtx.arc(p.x,p.y,r,0,Math.PI*2);
    fCtx.fillStyle=g;fCtx.fill();
  });
}
function flashField(){
  const el=document.getElementById('threshold-flash');
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'),70);
}
function ribosome(key){
  const el=document.getElementById('ribosome');
  el.textContent=RIBOSOME[key]||RIBOSOME.default;
  el.classList.add('visible');
  if(ribTimer)clearTimeout(ribTimer);
  ribTimer=setTimeout(()=>el.classList.remove('visible'),6500);
}
function save(){
  const data={
    cells:cells.map(c=>({
      id:c.id,x:c.x,y:c.y,intention:c.intention,timespan:c.timespan,unit:c.unit,
      color:c.color,size:c.size,fodder:c.fodder,state:c.state,charge:c.charge,
      lastVisit:c.lastVisit,born:c.born,isThreshold:c.isThreshold
    })),
    tubes:tubes.map(t=>({fromId:t.from.id,toId:t.to.id,spontaneous:t.spontaneous})),
    nextId,savedAt:Date.now()
  };
  try{
    localStorage.setItem('cellular-calendar',JSON.stringify(data));
    hasUnsavedChanges=false;
    showSaveIndicator();
    if(soundOn)sounds.save();
  }catch(e){console.error('Save failed:',e)}
}
function showSaveIndicator(){
  const el=document.getElementById('save-indicator');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),1500);
}
function load(){
  const stored=localStorage.getItem('cellular-calendar');
  if(!stored)return false;
  try{
    const data=JSON.parse(stored);
    nextId=data.nextId||1;
    data.cells.forEach(cd=>{
      const c=new Cell(cd.x,cd.y);
      c.id=cd.id;c.intention=cd.intention;c.timespan=cd.timespan;
      c.unit=cd.unit;c.color=cd.color;c.size=cd.size;
      c.fodder=cd.fodder||[];c.state=cd.state;c.charge=cd.charge;
      c.lastVisit=cd.lastVisit;c.born=cd.born;
      c.isThreshold=cd.isThreshold||false;
      c.setState(c.state);c.updateDisplay();cells.push(c);
    });
    data.tubes.forEach(td=>{
      const from=cells.find(c=>c.id===td.fromId);
      const to=cells.find(c=>c.id===td.toId);
      if(from&&to){
        tubes.push({from,to,spontaneous:td.spontaneous,progress:1,
          pOffset:Math.random(),strength:0.55,tension:0});
      }
    });
    hasUnsavedChanges=false;
    return true;
  }catch(e){console.error('Load failed:',e);return false}
}
function selectCell(cell){
  if(selected)selected.el.classList.remove('selected');
  selected=cell;
  if(!cell){renderPanel(null);return}
  cell.el.classList.add('selected');
  document.getElementById('panel').classList.add('open');
  renderPanel(cell);
}
function renderPanel(cell){
  const title=document.getElementById('panel-title');
  const content=document.getElementById('panel-content');
  if(!cell){
    title.textContent='cell';
    content.innerHTML=`<div id="panel-empty">select a cell<br>to tend it</div>`;
    return;
  }
  title.textContent=cell.intention||'forming...';
  const cp=Math.round(cell.charge);
  const fHTML=cell.fodder.length?
    cell.fodder.map((f,i)=>`<div class="fodder-item" data-i="${i}">↳ ${f}</div>`).join(''):
    `<div style="color:var(--text-dim);font-size:12px;font-style:italic;padding:5px 0">empty — add nourishment</div>`;
  content.innerHTML=`
    <span class="field-label">intention</span>
    <textarea id="fi" rows="2" placeholder="what does this cell hold?">${cell.intention}</textarea>
    <span class="field-label">timespan</span>
    <div class="timespan-row">
      <input type="number" id="ft" min="1" value="${cell.timespan}">
      <select id="fu">
        ${['hours','days','weeks','months','years'].map(u=>`<option ${cell.unit===u?'selected':''} value="${u}">${u}</option>`).join('')}
      </select>
    </div>
    <span class="field-label">state</span>
    <div class="state-selector">
      ${['active','dormant','spore','resurgent'].map(s=>
        `<button class="state-btn ${cell.state===s?'sel':''}" data-s="${s}">${s}</button>`
      ).join('')}
    </div>
    <span class="field-label">membrane</span>
    <input type="color" id="fc" value="${cell.color}">
    <span class="field-label">size</span>
    <input type="range" id="fs" min="75" max="240" value="${cell.size}">
    <span class="field-label">charge &nbsp;<span style="color:var(--charge);font-size:11px">${cp}%</span></span>
    <div class="charge-bar-outer"><div class="charge-bar-inner" style="width:${cp}%"></div></div>
    <hr class="div">
    <span class="field-label">fodder (living inside cell)</span>
    <div id="flist">${fHTML}</div>
    <div class="fodder-add">
      <textarea id="ff" rows="2" placeholder="add nourishment..."></textarea>
      <button class="btn" id="badd">+</button>
    </div>
    <hr class="div">
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      <button class="btn" id="bnourish">nourish</button>
      <button class="btn danger" id="bdissolve">dissolve</button>
    </div>
  `;
  const bind=(id,ev,fn)=>document.getElementById(id)?.addEventListener(ev,fn);
  bind('fi','input',e=>{cell.intention=e.target.value;title.textContent=cell.intention||'forming...';cell.updateDisplay()});
  bind('ft','input',e=>{cell.timespan=Math.max(1,parseInt(e.target.value)||1);cell.updateDisplay()});
  bind('fu','change',e=>{cell.unit=e.target.value;cell.updateDisplay()});
  bind('fc','input',e=>{cell.color=e.target.value;cell.updateDisplay()});
  bind('fs','input',e=>{cell.size=parseInt(e.target.value);cell.updateDisplay()});
  document.querySelectorAll('.state-btn').forEach(btn=>btn.addEventListener('click',()=>{
    cell.setState(btn.dataset.s);
    document.querySelectorAll('.state-btn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');renderPanel(cell);
  }));
  document.querySelectorAll('.fodder-item').forEach(item=>item.addEventListener('click',()=>{
    cell.fodder.splice(parseInt(item.dataset.i),1);
    cell.updateDisplay();renderPanel(cell);
  }));
  bind('badd','click',()=>{
    const v=document.getElementById('ff').value.trim();
    if(v){cell.fodder.push(v);cell.visit();renderPanel(cell)}
  });
  bind('ff','keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();document.getElementById('badd').click()}});
  bind('bnourish','click',()=>{cell.visit();renderPanel(cell);ribosome('charge')});
  bind('bdissolve','click',()=>{
    cell.setState('spore');renderPanel(cell);
    setTimeout(()=>{
      if(cell.state==='spore'){
        cell.remove();selectCell(null);
        document.getElementById('panel').classList.remove('open');
      }
    },28000);
  });
}
document.getElementById('btn-new').addEventListener('click',()=>{
  const c=new Cell(
    200+Math.random()*(window.innerWidth-520),
    70+Math.random()*(window.innerHeight-140)
  );
  cells.push(c);sounds.newCell();selectCell(c);save();
});
document.getElementById('btn-connect').addEventListener('click',e=>{
  connectMode=!connectMode;
  e.target.classList.toggle('active-mode');
  e.target.textContent=connectMode?'connecting...':'connect';
  if(!connectMode&&connectFrom){connectFrom.el.style.outline='';connectFrom=null}
});
document.getElementById('btn-sound').addEventListener('click',e=>{
  soundOn=!soundOn;
  e.target.textContent=soundOn?'♪ on':'♪ off';
});
document.getElementById('btn-save').addEventListener('click',()=>{
  save();
  ribosome('default');
});
document.getElementById('close-panel').addEventListener('click',()=>{
  document.getElementById('panel').classList.remove('open');
  if(selected){selected.el.classList.remove('selected');selected=null}
});
document.body.addEventListener('click',e=>{
  if(e.target===document.body||e.target===fCanvas||e.target===mCanvas){
    if(selected){selected.el.classList.remove('selected');selected=null}
    document.getElementById('panel').classList.remove('open');
  }
});
document.addEventListener('mousemove',e=>{if(dragging){dragging.move(e.clientX-dragOX,e.clientY-dragOY);hasUnsavedChanges=true}});
document.addEventListener('mouseup',()=>{if(dragging)save();dragging=null});
let lastT=Date.now();
function animate(){
  const now=Date.now();
  const dt=(now-lastT)/1000;
  lastT=now;
  cells.forEach(c=>c.decay(dt));
  drawField();drawTubes();
  requestAnimationFrame(animate);
}
animate();
const statusMsgs=[
  'inhabit like you live here',
  'cells nourished by attention',
  'fascia carries light and tension',
  'the matrix holds what dissolves',
  'thresholds make patterns legible',
  'nothing lost — everything transforms',
  'complexity coherent, not predictive'
];
let sIdx=0;
const statusEl=document.getElementById('status');
setInterval(()=>{
  sIdx=(sIdx+1)%statusMsgs.length;
  statusEl.style.opacity=0;
  setTimeout(()=>{statusEl.textContent=statusMsgs[sIdx];statusEl.style.opacity=1},600);
},12000);
const loaded=load();
if(!loaded){
  const seed=new Cell(window.innerWidth*0.4,window.innerHeight*0.48);
  seed.intention='now';seed.timespan=1;seed.unit='days';
  seed.charge=32;seed.updateDisplay();cells.push(seed);save();
}
</script>
</body>
</html>
